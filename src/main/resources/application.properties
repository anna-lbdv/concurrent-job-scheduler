server.port=8080

db.url=jdbc:h2:mem:jobscheduler;DB_CLOSE_DELAY=-1
db.user=sa
db.password=
db.pool.size=10

scheduler.worker.threads=4
scheduler.max.concurrent.runs=10
scheduler.queue.capacity=50
scheduler.poll.interval.ms=1000
scheduler.default.timeout.ms=30000
scheduler.default.max.retries=3
scheduler.base.backoff.ms=1000
scheduler.max.backoff.ms=60000
scheduler.shutdown.grace.ms=10000
